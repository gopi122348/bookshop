<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}BookShop{% endblock %}</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
body { background-color: #f8f9fa; }
.book-card { transition: transform .2s; border: none; box-shadow: 0 2px 8px rgba(0,0,0,.1); }
.book-card:hover { transform: translateY(-4px); }
</style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
<div class="container">
    <a class="navbar-brand" href="{% url 'book_list' %}">📚 BookShop</a>
    <div class="navbar-nav ms-auto align-items-center">
        <a class="nav-link text-white" href="{% url 'book_list' %}">All Books</a>
        {% if user.is_authenticated %}
            <span class="nav-link text-secondary">{{ user.username }}</span>
            <a class="nav-link text-white" href="{% url 'cart' %}">🛒 Cart</a>
            <a class="nav-link text-white" href="{% url 'order_history' %}">📦 Orders</a>
            <a class="nav-link btn btn-outline-light text-white ms-2 px-3" href="{% url 'logout' %}">Log Out</a>
        {% else %}
            <a class="nav-link text-white" href="{% url 'login' %}">Log In</a>
            <a class="nav-link btn btn-success text-white ms-2 px-3" href="{% url 'book_create' %}">+ Add Book</a>
        {% endif %}
    </div>
</div>
</nav>
<div class="container">
{% if messages %}
    {% for message in messages %}
        <div class="alert alert-{{ message.tags }} alert-dismissible fade show">
            {{ message }}
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
    {% endfor %}
{% endif %}
{% block content %}{% endblock %}
</div>
<footer class="text-center text-muted mt-5 py-3 border-top">
<small>Django BookShop — Cloud DevOpsSec © 2026</small>
</footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
