name: CI/CD Pipeline - Django Bookshop

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    name: Run Tests, Linting, Coverage, and SonarCloud
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install coverage pytest pytest-django pylint

      - name: Run Django unit tests
        run: python manage.py test

      - name: Run pytest
        run: pytest books/tests.py -v
        env:
          DJANGO_SETTINGS_MODULE: bookshop.settings

      - name: Run pylint
        run: pylint books/ --output-format=text --fail-under=5.0
        continue-on-error: true

      - name: Run tests with coverage
        run: |
          coverage run -m pytest
          coverage xml

      - name: SonarCloud Scan
        uses: sonarsource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=gopi122348_bookshop
            -Dsonar.organization=gopi122348
            -Dsonar.sources=books
            -Dsonar.python.version=3.11
            -Dsonar.coverage.reportPaths=coverage.xml
            -Dsonar.qualitygate.wait=false

      - name: Run TruffleHog secret detection
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --only-verified
        continue-on-error: true

      - name: Run Safety dependency check
        run: |
          pip install safety
          safety check -r requirements.txt --output text
        continue-on-error: true

  deploy:
    name: Deploy to AWS Elastic Beanstalk
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout source code
        uses: actions/checkout@v3

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install AWS EB CLI
        run: pip install awsebcli

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1

      - name: Deploy to Elastic Beanstalk
        run: |
          mkdir -p .elasticbeanstalk
          cat > .elasticbeanstalk/config.yml << 'EBEOF'
          branch-defaults:
            main:
              environment: bookshop-env
          global:
            application_name: bookshop
            default_region: us-east-1
            sc: git
          EBEOF
          eb deploy bookshop-env --timeout 20
