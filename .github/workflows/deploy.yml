name: CI/CD Pipeline - Django Bookshop

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    name: Run Tests and Static Analysis

    steps:
      - name: Checkout source code
        uses: actions/checkout@v3

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-django pylint flake8 bandit

      - name: Run Django unit tests
        run: python manage.py test

      - name: Run pytest
        run: |
          pytest books/tests.py -v
        env:
          DJANGO_SETTINGS_MODULE: bookshop.settings

      - name: Run flake8 linting
        run: flake8 books/ --max-line-length=120 --statistics
        continue-on-error: true

      - name: Run pylint check
        run: pylint books/ --output-format=text --fail-under=5.0
        continue-on-error: true

      - name: Run bandit security scan
        run: bandit -r books/ -f txt
        continue-on-error: true

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v2
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

  deploy:
    runs-on: ubuntu-latest
    name: Deploy to AWS Elastic Beanstalk
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout source code
        uses: actions/checkout@v3

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install AWS EB CLI
        run: pip install awsebcli

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1

      - name: Deploy to Elastic Beanstalk
        run: |
          mkdir -p .elasticbeanstalk
          cat > .elasticbeanstalk/config.yml << 'EBEOF'
          branch-defaults:
            main:
              environment: bookshop-env
          global:
            application_name: bookshop
            default_region: us-east-1
            sc: git
          EBEOF
          eb deploy bookshop-env --timeout 20
      