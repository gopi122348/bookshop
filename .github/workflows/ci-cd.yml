name: CI/CD Pipeline - Django Bookshop

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    name: Run Tests, Linting, Coverage, and SonarCloud

    steps:
      # Checkout the code
      - name: Checkout source code
        uses: actions/checkout@v3

      # Setup Python
      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      # Install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install coverage pytest pytest-django pylint

      # Run Django unit tests
      - name: Run Django unit tests
        run: python manage.py test
        env:
          DJANGO_SETTINGS_MODULE: bookshop.settings
          DATABASE_URL: sqlite:///test_db.sqlite3
          SECRET_KEY: django-insecure-ci-test-key-123
          DEBUG: "True"

      # Run pytest directly
      - name: Run pytest
        run: pytest books/tests.py -v
        env:
          DJANGO_SETTINGS_MODULE: bookshop.settings

      # Run pylint
      - name: Run pylint
        run: pylint books/ --output-format=text --fail-under=5.0
        continue-on-error: true

      # Run tests with coverage and generate XML report
      - name: Run tests with coverage
        run: |
          coverage run -m pytest
          coverage xml

      # SonarCloud analysis
      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=gopi122348_bookshop
            -Dsonar.organization=gopi122348
            -Dsonar.sources=books
            -Dsonar.python.version=3.11
            -Dsonar.coverage.reportPaths=coverage.xml
            -Dsonar.qualitygate.wait=true

  deploy:
    runs-on: ubuntu-latest
    name: Deploy to AWS Elastic Beanstalk
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
      # Checkout the code
      - name: Checkout source code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
      # Setup Python
      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      # Install EB CLI
      - name: Install AWS EB CLI
        run: pip install awsebcli

      # Configure AWS credentials
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1

      # Deploy to Elastic Beanstalk
      - name: Deploy to Elastic Beanstalk
        run: |
          mkdir -p .elasticbeanstalk
          cat > .elasticbeanstalk/config.yml << 'EBEOF'
          branch-defaults:
            main:
              environment: bookshop-env
          global:
            application_name: bookshop
            default_region: us-east-1
            sc: git
          EBEOF
          eb deploy bookshop-env --timeout 20